services:

  backend:
    build:
      context: ./Backend
    container_name: itech-backend
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app

  frontend:
    build:
      context: .
      args:
        - REACT_APP_SERVER_URL=${REACT_APP_SERVER_URL}
    container_name: itech-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend